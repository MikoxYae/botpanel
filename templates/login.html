<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Yae Miko Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-box">
      <div class="login-logo">
        <span style="font-size:44px">🌸</span>
        <div class="logo-title" style="font-size:22px;margin-top:8px">Yae Miko</div>
        <div class="logo-sub">VPS Dashboard</div>
      </div>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}
      <form method="POST" action="{{ url_for('login') }}" class="login-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" placeholder="Enter username" required autofocus autocomplete="username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-full">Login →</button>
      </form>
    </div>
  </div>
</body>
</html>

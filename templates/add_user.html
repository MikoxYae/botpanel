{% extends "base.html" %}
{% block title %}Add User{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">Add New User</h1>
    <p class="page-sub">Fill in the details below</p>
  </div>
  <a href="{{ url_for('users') }}" class="btn btn-outline">← Back</a>
</div>

<div class="card form-card">
  <form method="POST" action="{{ url_for('add_user') }}">
    <div class="form-grid">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" name="name" placeholder="Rahul Sharma" required />
      </div>
      <div class="form-group">
        <label>Telegram ID *</label>
        <input type="text" name="telegram_id" placeholder="712345678" required />
      </div>
      <div class="form-group">
        <label>Bot Name *</label>
        <input type="text" name="bot_name" placeholder="@mybot" required />
      </div>
      <div class="form-group">
        <label>Plan</label>
        <select name="plan">
          <option value="Starter">Starter</option>
          <option value="Basic" selected>Basic</option>
          <option value="Standard">Standard</option>
          <option value="Pro">Pro</option>
          <option value="Premium">Premium</option>
        </select>
      </div>
      <div class="form-group">
        <label>Monthly Amount (₹) *</label>
        <input type="number" name="amount" value="299" min="1" required />
      </div>
      <div class="form-group">
        <label>Service Start Date <span class="label-hint">(Purane users ke liye)</span></label>
        <input type="date" name="start_date" value="{{ today }}" />
        <span class="field-hint">Kab se bot host ho raha hai — old users ke liye purani date daalo</span>
      </div>
      <div class="form-group form-group--full">
        <label>Notes</label>
        <textarea name="notes" rows="3" placeholder="Any special notes about this user..."></textarea>
      </div>
    </div>
    <div class="form-actions">
      <a href="{{ url_for('users') }}" class="btn btn-ghost">Cancel</a>
      <button type="submit" class="btn btn-primary">Add User + Create Payment Record</button>
    </div>
  </form>
</div>
{% endblock %}
